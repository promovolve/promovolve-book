[book]
authors = ["Promovolve Team"]
language = "ja"
src = "src-ja"
title = "Promovolve: 広告オークションアルゴリズムとアーキテクチャ"

[build]
build-dir = "book/ja"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
additional-js = ["mermaid.min.js", "mermaid-init.js", "lang-toggle.js"]
additional-css = ["lang-toggle.css"]

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
